services:
  db:
    image: postgres:16-alpine
    container_name: coty-cafe-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coty_cafe
    volumes:
      - coty_cafe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d coty_cafe']
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  coty_cafe_pgdata:
